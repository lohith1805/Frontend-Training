<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hour 2 - Forms & Inputs</title>
</head>
<body>

    <h2>Form Inputs Practice</h2>
    <form>
        <p>
            <label>Text Input:</label><br>
            <input type="text" placeholder="Enter Name">
        </p>

        <p>
            <label>Email Input:</label><br>
            <input type="email" placeholder="Enter Email">
        </p>

        <p>
            <label>Password Input:</label><br>
            <input type="password" placeholder="Enter Password">
        </p>

        <p>
            <label>Radio Buttons (Select One):</label><br>
            <input type="radio" id="opt1" name="choices" value="1">
            <label for="opt1">Option 1</label>
            
            <input type="radio" id="opt2" name="choices" value="2">
            <label for="opt2">Option 2</label>
        </p>

        <p>
            <label>Checkboxes (Select Multiple):</label><br>
            <input type="checkbox" id="check1" value="A">
            <label for="check1">Choice A</label>
            
            <input type="checkbox" id="check2" value="B">
            <label for="check2">Choice B</label>
        </p>

        <p>
            <label>Dropdown Menu:</label><br>
            <select>
                <option value="">-- Choose an option --</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="js">JavaScript</option>
            </select>
        </p>
    </form>

</body>
</html>
