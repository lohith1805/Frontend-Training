<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hour 3 - Student Registration Form</title>
</head>
<body>

    <div style="border: 2px solid #2c3e50; padding: 30px; width: 450px; margin: 30px auto; font-family: Arial, sans-serif; border-radius: 8px;">
        
        <h2 style="text-align: center; margin-top: 0; color: #2c3e50;">Student Registration Form</h2>
        <hr style="border: 0; border-top: 1px solid #ccc; margin-bottom: 20px;">
        
        <form>
            <p>
                <label for="fullname"><strong>Full Name:</strong></label><br>
                <input type="text" id="fullname" placeholder="Enter your full name" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;" required>
            </p>

            <p>
                <label for="email"><strong>Email Address:</strong></label><br>
                <input type="email" id="email" placeholder="username@example.com" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;" required>
            </p>

            <p>
                <label for="phone"><strong>Phone Number:</strong></label><br>
                <input type="tel" id="phone" placeholder="Enter phone number" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;" required>
            </p>

            <p>
                <label><strong>Gender:</strong></label><br style="margin-bottom: 5px;">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                
                <input type="radio" id="female" name="gender" value="female" style="margin-left: 15px;">
                <label for="female">Female</label>
                
                <input type="radio" id="other" name="gender" value="other" style="margin-left: 15px;">
                <label for="other">Other</label>
            </p>

            <p>
                <label for="course"><strong>Course Selection:</strong></label><br>
                <select id="course" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;" required>
                    <option value="">-- Select a Branch --</option>
                    <option value="cse">CSE (Computer Science & Engineering)</option>
                    <option value="it">IT (Information Technology)</option>
                    <option value="ece">ECE (Electronics & Communication Engineering)</option>
                    <option value="eee">EEE (Electrical & Electronics Engineering)</option>
                    <option value="mech">MECH (Mechanical Engineering)</option>
                    <option value="civil">CIVIL (Civil Engineering)</option>
                </select>
            </p>

            <p>
                <label for="address"><strong>Address:</strong></label><br>
                <textarea id="address" rows="4" placeholder="Enter your complete address" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; resize: vertical;" required></textarea>
            </p>

            <hr style="border: 0; border-top: 1px solid #ccc; margin: 20px 0;">

            <p style="text-align: center; margin-bottom: 0;">
                <button type="submit" style="background-color: #2c3e50; color: white; padding: 12px 25px; border: none; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; border-radius: 4px;">
                    Submit Registration
                </button>
            </p>
        </form>
    </div>

</body>
</html>
