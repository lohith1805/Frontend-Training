<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hour 2: Audio & Video Elements</title>
</head>
<body>

    <header>
        <h1>Multimedia Practice</h1>
    </header>

    <section>
        <h2>1. Audio Player</h2>
        <audio controls>
            <source src="Sample.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </section>

    <section>
        <h2>2. Video Player</h2>
        <video controls width="400">
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </section>

    <section>
        <h2>3. YouTube Embedded Video</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/JgN-P60vFC8?si=tD74Vcbkpn7_3up8" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
